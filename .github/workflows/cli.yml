name: CLI

on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:
    inputs:
      action_type:
        description: 操作类型
        required: false
        default: schedule
        type: choice
        options:
          - test
          - renew
          - schedule
          - show
          - restart
      tag_name:
        description: Server Tag
        required: false
        default: all
        type: choice
        options:
          - all
          - h-api
          - h-www
          - l-www
          - l-i

jobs:
  run:
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    container:
      image: cloakhq/cloakbrowser

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SOURCE_REPO_PAT }}
          repository: HEUDavid/AutoAction
          ref: main

      - run: ./tools/cicd.sh
        env:
          DEBIAN_FRONTEND: noninteractive
          PIP_DISABLE_PIP_VERSION_CHECK: 1
          PIP_NO_CACHE_DIR: 1
          PIP_ROOT_USER_ACTION: ignore
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
          ACTION_TYPE: ${{ github.event.inputs.action_type || 'schedule' }}
          TAG: ${{ github.event.inputs.tag_name || 'all' }}
        shell: bash

      - uses: softprops/action-gh-release@v3
        with:
          name: Latest
          tag_name: latest
          files: data.zip

      - name: Checkout self
        uses: actions/checkout@v6
        with:
          path: cli
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - run: python ./tools/set_cron.py
        id: cron

      - name: Commit and push new schedule
        working-directory: ./cli
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/cli.yml
          git commit -m "next schedule: ${{ steps.cron.outputs.next_schedule }}" || echo "No changes to commit"
          git pull --rebase
          git push