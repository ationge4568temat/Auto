name: CLI

on:
  schedule:
    - cron: '25 17 1-31/2 * *'
  workflow_dispatch:
    inputs:
      action_type:
        description: 操作类型
        required: false
        default: show
        type: choice
        options:
          - test
          - renew
          - show
          - restart
      tag_name:
        description: Server Tag (仅用于 show 或 restart)
        required: false
        default: all
        type: choice
        options:
          - all
          - h-api
          - h-www
          - k-api
          - k-i
          - l-api
          - l-i

jobs:
  run:
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    container:
      image: cloakhq/cloakbrowser

    steps:
      - name: Determine Param
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "PARAM=show" >> $GITHUB_ENV
            echo "TAG=all" >> $GITHUB_ENV
          else
            echo "PARAM=${{ github.event.inputs.action_type }}" >> $GITHUB_ENV
            echo "TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SOURCE_REPO_PAT }}
          repository: HEUDavid/AutoAction
          ref: main

      - run: ./tools/cicd.sh
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
          DEBIAN_FRONTEND: noninteractive
        shell: bash

      - uses: softprops/action-gh-release@v3
        with:
          name: Latest
          tag_name: latest
          files: data.zip

      - name: Checkout self
        uses: actions/checkout@v6
        with:
          path: cli

      - run: python ./tools/set_cron.py

      - name: Commit and Push new schedule
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        working-directory: ./cli
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/cli.yml
          git commit -m "chore: update schedule to a random time" || echo "No changes to commit"
          git pull --rebase
          git push